# ==================================================
# ANNUAL AUDIT SERVICE - Base Configuration
# ==================================================
# Profile Selection: Use -Dspring.profiles.active=local|dev|test|uat
# Default profile is 'local' - override with command line or env variable

spring.profiles.active=dev

spring.application.name=ANNUAL-AUDIT-SERVICE

# Server Configuration
server.port=7791
server.servlet.session.cookie.same-site=strict

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.generate-ddl=true
spring.jpa.show-sql=true
spring.jpa.database=postgresql
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata

# Datasource Driver
spring.datasource.driver-class-name=org.postgresql.Driver

# Logging
logging.level.root=INFO
logging.level.in.lms.cca=DEBUG
logging.level.javax.mail=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Springdoc/Swagger
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/annual-audit-service/api-docs
springdoc.packages-to-scan=in.lms.cca.controller
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/annual-audit-service/swagger-ui.html

# Eureka Client Config
eureka.instance.prefer-ip-address=true
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
