# ==================================================
# NOTIFICATION SERVICE - Base Configuration
# ==================================================
# Profile Selection: Use -Dspring.profiles.active=local|dev|test|uat
# Default profile is 'local' - override with command line or env variable

spring.profiles.active=dev

spring.application.name=NOTIFICATION-SERVICE

# Server Configuration
server.port=7780
server.servlet.session.cookie.same-site=strict

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.generate-ddl=true
spring.jpa.show-sql=true
spring.jpa.database=postgresql
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata

# Datasource Driver
spring.datasource.driver-class-name=org.postgresql.Driver

# Email Configuration (SMTP)
spring.mail.host=smtp.cdac.in
spring.mail.port=587
spring.mail.username=efms@cdac.in
spring.mail.password=efms@12#98
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.ssl.trust=smtp.cdac.in
spring.mail.properties.mail.ssl.protocols=TLSv1.2,TLSv1.3,TLSv1,TLSv1.1
spring.mail.properties.mail.ssl.ciphersuites=TLS_RSA_WITH_AES_128_CBC_SHA,TLS_RSA_WITH_AES_256_CBC_SHA,TLS_RSA_WITH_3DES_EDE_CBC_SHA,TLS_ECDHE_RSA_WITH_AES_128_CBC_SHA256,TLS_ECDHE_RSA_WITH_AES_256_CBC_SHA384,TLS_DHE_RSA_WITH_AES_128_CBC_SHA256,TLS_DHE_RSA_WITH_AES_256_CBC_SHA256,TLS_ECDHE_RSA_WITH_AES_128_CBC_SHA256,TLS_ECDHE_RSA_WITH_AES_256_CBC_SHA38,TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384,TLS_DHE_RSA_WITH_AES_128_CBC_SHA256,TLS_DHE_RSA_WITH_AES_256_CBC_SHA256,TLS_DHE_RSA_WITH_AES_256_GCM_SHA384,TLS_AES_128_GCM_SHA256,TLS_AES_256_GCM_SHA384,TLS_CHACHA20_POLY1305_SHA256

# SMS API
sms.api.url=https://msdgweb.mgov.gov.in/esms/sendsmsrequestDLT

# Logging
logging.level.root=INFO
logging.level.in.lms.cca=DEBUG
logging.level.javax.mail=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Springdoc/Swagger
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/notification-service/api-docs
springdoc.packages-to-scan=in.lms.cca.controller
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/notification-service/swagger-ui.html

# Eureka Client Config
eureka.instance.prefer-ip-address=true
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
