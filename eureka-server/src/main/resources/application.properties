# ==================================================
# EUREKA SERVER - Base Configuration
# ==================================================
# Profile Selection: Use -Dspring.profiles.active=local|dev|test|uat
# Default profile is 'local' - override with command line or env variable

spring.profiles.active=local

spring.application.name=eureka-server

# Server Port
server.port=7777

# Eureka Server Configuration (self-registration disabled)
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
