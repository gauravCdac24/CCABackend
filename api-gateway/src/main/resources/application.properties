# ==================================================
# API GATEWAY - Base Configuration
# ==================================================
# Profile Selection: Use -Dspring.profiles.active=local|dev|test|uat
# Default profile is 'local' - override with command line or env variable

spring.profiles.active=local

spring.application.name=API-GATEWAY

# Server Port
server.port=7778

# Gateway Default Filters
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
spring.cloud.gateway.default-filters[1].name=CSPFilter

# Logging
logging.level.root=INFO
logging.level.in.lms.cca=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Springdoc/Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config
springdoc.swagger-ui.urls[0].url=/admin-service/api-docs
springdoc.swagger-ui.urls[0].name=ADMIN-SERVICE
springdoc.swagger-ui.urls[1].url=/notification-service/api-docs
springdoc.swagger-ui.urls[1].name=NOTIFICATION-SERVICE
springdoc.swagger-ui.urls[2].url=/esign-service/api-docs
springdoc.swagger-ui.urls[2].name=ESIGN-SERVICE
springdoc.swagger-ui.urls[3].url=/auth-service/api-docs
springdoc.swagger-ui.urls[3].name=AUTH-SERVICE
springdoc.swagger-ui.urls[4].url=/newlicense-service/api-docs
springdoc.swagger-ui.urls[4].name=NEWLICENSE-SERVICE
springdoc.swagger-ui.urls[5].url=/license-issuance-service/api-docs
springdoc.swagger-ui.urls[5].name=LICENSE-ISSUANCE-SERVICE
springdoc.swagger-ui.urls[6].url=/renew-license-service/api-docs
springdoc.swagger-ui.urls[6].name=RENEWAL-SERVICE
springdoc.swagger-ui.urls[7].url=/esign-application-service/api-docs
springdoc.swagger-ui.urls[7].name=ESIGN-APPLICATION-SERVICE
springdoc.swagger-ui.urls[8].url=/audit-service/api-docs
springdoc.swagger-ui.urls[8].name=AUDIT-SERVICE
springdoc.swagger-ui.urls[9].url=/renew-audit-service/api-docs
springdoc.swagger-ui.urls[9].name=RENEW-AUDIT-SERVICE
springdoc.swagger-ui.urls[10].url=/dashboard-service/api-docs
springdoc.swagger-ui.urls[10].name=DASHBOARD-SERVICE
springdoc.swagger-ui.urls[11].url=/cessation-service/api-docs
springdoc.swagger-ui.urls[11].name=CESSATION-SERVICE
springdoc.swagger-ui.urls[12].url=/annual-audit-service/api-docs
springdoc.swagger-ui.urls[12].name=ANNUAL-AUDIT-SERVICE

# Eureka Client Config (static)
eureka.instance.prefer-ip-address=true
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true

# NOTE: Gateway routes are defined in profile-specific files
# (application-local.properties, application-dev.properties, etc.)
# because Spring Cloud Gateway arrays don't merge across property files
